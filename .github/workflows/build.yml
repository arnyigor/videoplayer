name: Build APK

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_major:
        description: 'Major version'
        required: false
        default: ''
      version_minor:
        description: 'Minor version'
        required: false
        default: ''
      version_build:
        description: 'Build number'
        required: false
        default: ''
      build_type:
        description: 'Build type (release/debug)'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Resolve build type
        id: build_meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUILD_TYPE="${{ inputs.build_type }}"
          else
            BUILD_TYPE="release"
          fi
          echo "build_type=$BUILD_TYPE" >> "$GITHUB_OUTPUT"
          echo "Resolved build type: $BUILD_TYPE"

      - name: Override version from workflow inputs
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version_major != '' }}
        run: |
          MAJOR="${{ inputs.version_major }}"
          MINOR="${{ inputs.version_minor }}"
          BUILD="${{ inputs.version_build }}"
          PROPS="version.properties"

          if [ -n "$MAJOR" ]; then sed -i "s/^VERSION_MAJOR=.*/VERSION_MAJOR=$MAJOR/" "$PROPS"; fi
          if [ -n "$MINOR" ]; then sed -i "s/^VERSION_MINOR=.*/VERSION_MINOR=$MINOR/" "$PROPS"; fi
          if [ -n "$BUILD" ]; then sed -i "s/^VERSION_BUILD=.*/VERSION_BUILD=$BUILD/" "$PROPS"; fi

          echo "Overridden version:"
          cat "$PROPS"

      - name: Read version from properties
        id: version
        run: |
          MAJOR=$(grep '^VERSION_MAJOR=' version.properties | cut -d'=' -f2)
          MINOR=$(grep '^VERSION_MINOR=' version.properties | cut -d'=' -f2)
          BUILD=$(grep '^VERSION_BUILD=' version.properties | cut -d'=' -f2)

          VERSION_NAME="${MAJOR}.${MINOR}.${BUILD}"
          VERSION_CODE=$((MAJOR * 100 + MINOR * 10 + BUILD))

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION_NAME ($VERSION_CODE)"

      - name: Validate required app secrets
        env:
          DATA_LINK: ${{ secrets.DATA_LINK }}
          DATA_0_LINK: ${{ secrets.DATA_0_LINK }}
          BASE_LINK_FILE: ${{ secrets.BASE_LINK_FILE }}
          UPDATE_LINK: ${{ secrets.UPDATE_LINK }}
          BASE_LINK: ${{ secrets.BASE_LINK }}
        run: |
          missing=0

          for var in DATA_LINK DATA_0_LINK BASE_LINK_FILE UPDATE_LINK BASE_LINK; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing secret::$var is not set"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Required app secrets are missing."
            exit 1
          fi

      - name: Create secrets.properties
        env:
          DATA_LINK: ${{ secrets.DATA_LINK }}
          DATA_0_LINK: ${{ secrets.DATA_0_LINK }}
          BASE_LINK_FILE: ${{ secrets.BASE_LINK_FILE }}
          UPDATE_LINK: ${{ secrets.UPDATE_LINK }}
          BASE_LINK: ${{ secrets.BASE_LINK }}
        run: |
          {
            printf 'DATA_LINK=%s\n' "$DATA_LINK"
            printf 'DATA_0_LINK=%s\n' "$DATA_0_LINK"
            printf 'BASE_LINK_FILE=%s\n' "$BASE_LINK_FILE"
            printf 'UPDATE_LINK=%s\n' "$UPDATE_LINK"
            printf 'BASE_LINK=%s\n' "$BASE_LINK"
          } > secrets.properties

          echo "Created secrets.properties"
          test -f secrets.properties

      - name: Validate release signing secrets
        if: ${{ steps.build_meta.outputs.build_type == 'release' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=0

          for var in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing release secret::$var is not set"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Release signing secrets are missing."
            exit 1
          fi

      - name: Decode keystore
        if: ${{ steps.build_meta.outputs.build_type == 'release' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
          test -f app/release.keystore

      - name: Create signing.properties
        if: ${{ steps.build_meta.outputs.build_type == 'release' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          {
            printf 'STORE_FILE=%s\n' 'release.keystore'
            printf 'STORE_PASSWORD=%s\n' "$KEYSTORE_PASSWORD"
            printf 'KEY_ALIAS=%s\n' "$KEY_ALIAS"
            printf 'KEY_PASSWORD=%s\n' "$KEY_PASSWORD"
          } > signing.properties

          echo "Created signing.properties"
          test -f signing.properties

      - name: Build release APK
        if: ${{ steps.build_meta.outputs.build_type == 'release' }}
        run: ./gradlew assembleRelease --stacktrace --warning-mode all

      - name: Build debug APK
        if: ${{ steps.build_meta.outputs.build_type == 'debug' }}
        run: ./gradlew assembleDebug --stacktrace --warning-mode all

      - name: Upload release APK
        if: ${{ steps.build_meta.outputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: mobilecinema-v${{ steps.version.outputs.version_name }}-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload debug APK
        if: ${{ steps.build_meta.outputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: mobilecinema-v${{ steps.version.outputs.version_name }}-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') && steps.build_meta.outputs.build_type == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          name: Release v${{ steps.version.outputs.version_name }}

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -f secrets.properties
          rm -f signing.properties
          rm -f app/release.keystore