name: Build APK

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_major:
        description: 'Major version'
        required: false
        default: ''
      version_minor:
        description: 'Minor version'
        required: false
        default: ''
      version_build:
        description: 'Build number'
        required: false
        default: ''
      build_type:
        description: 'Build type (release/debug)'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Override version from workflow inputs
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version_major != '' }}
        run: |
          MAJOR="${{ inputs.version_major }}"
          MINOR="${{ inputs.version_minor }}"
          BUILD="${{ inputs.version_build }}"
          PROPS="version.properties"

          if [ -n "$MAJOR" ]; then sed -i "s/^VERSION_MAJOR=.*/VERSION_MAJOR=$MAJOR/" "$PROPS"; fi
          if [ -n "$MINOR" ]; then sed -i "s/^VERSION_MINOR=.*/VERSION_MINOR=$MINOR/" "$PROPS"; fi
          if [ -n "$BUILD" ]; then sed -i "s/^VERSION_BUILD=.*/VERSION_BUILD=$BUILD/" "$PROPS"; fi

          echo "Overridden version:"
          cat "$PROPS"

      - name: Read version from properties
        id: version
        run: |
          MAJOR=$(grep '^VERSION_MAJOR=' version.properties | cut -d'=' -f2)
          MINOR=$(grep '^VERSION_MINOR=' version.properties | cut -d'=' -f2)
          BUILD=$(grep '^VERSION_BUILD=' version.properties | cut -d'=' -f2)

          VERSION_NAME="${MAJOR}.${MINOR}.${BUILD}"
          VERSION_CODE=$((MAJOR * 100 + MINOR * 10 + BUILD))

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION_NAME ($VERSION_CODE)"

      - name: Create secrets.properties
        run: |
          cat > secrets.properties <<EOF
          DATA_LINK=${{ secrets.DATA_LINK }}
          DATA_0_LINK=${{ secrets.DATA_0_LINK }}
          BASE_LINK_FILE=${{ secrets.BASE_LINK_FILE }}
          UPDATE_LINK=${{ secrets.UPDATE_LINK }}
          BASE_LINK=${{ secrets.BASE_LINK }}
          EOF

          echo "Created secrets.properties in project root"
          ls -la
          test -f secrets.properties

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          test -f app/release.keystore

      - name: Create signing.properties
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cat > signing.properties <<EOF
          STORE_FILE=release.keystore
          STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

          echo "Created signing.properties in project root"
          test -f signing.properties

      - name: Build release APK
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_type == 'release') || (github.event_name != 'workflow_dispatch') }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Build debug APK
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug' }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload release APK
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_type == 'release') || (github.event_name != 'workflow_dispatch') }}
        uses: actions/upload-artifact@v4
        with:
          name: mobilecinema-v${{ steps.version.outputs.version_name }}-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload debug APK
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: mobilecinema-v${{ steps.version.outputs.version_name }}-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          name: Release v${{ steps.version.outputs.version_name }}

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -f secrets.properties
          rm -f signing.properties
          rm -f app/release.keystore