name: Build APK

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_major:
        description: 'Major version'
        required: false
        default: ''
      version_minor:
        description: 'Minor version'
        required: false
        default: ''
      version_build:
        description: 'Build number'
        required: false
        default: ''
      build_type:
        description: 'Build type (release/debug)'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Override version from workflow inputs
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version_major != '' }}
        run: |
          MAJOR="${{ inputs.version_major }}"
          MINOR="${{ inputs.version_minor }}"
          BUILD="${{ inputs.version_build }}"
          PROPS="version.properties"
          if [ -n "$MAJOR" ]; then sed -i "s/VERSION_MAJOR=.*/VERSION_MAJOR=$MAJOR/" "$PROPS"; fi
          if [ -n "$MINOR" ]; then sed -i "s/VERSION_MINOR=.*/VERSION_MINOR=$MINOR/" "$PROPS"; fi
          if [ -n "$BUILD" ]; then sed -i "s/VERSION_BUILD=.*/VERSION_BUILD=$BUILD/" "$PROPS"; fi
          echo "Overridden version:"
          cat "$PROPS"

      - name: Read version from properties
        id: version
        run: |
          MAJOR=$(grep VERSION_MAJOR version.properties | cut -d'=' -f2)
          MINOR=$(grep VERSION_MINOR version.properties | cut -d'=' -f2)
          BUILD=$(grep VERSION_BUILD version.properties | cut -d'=' -f2)
          VERSION_NAME="${MAJOR}.${MINOR}.${BUILD}"
          VERSION_CODE=$((MAJOR * 100 + MINOR * 10 + BUILD))
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION_NAME ($VERSION_CODE)"

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Create signing.properties
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "STORE_FILE=release.keystore" > signing.properties
          echo "STORE_PASSWORD=$KEYSTORE_PASSWORD" >> signing.properties
          echo "KEY_ALIAS=$KEY_ALIAS" >> signing.properties
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> signing.properties

      - name: Build release APK
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_type == 'release') || (github.event_name != 'workflow_dispatch' && !contains(github.ref, 'debug')) }}
        run: ./gradlew assembleRelease

      - name: Build debug APK
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug' }}
        run: ./gradlew assembleDebug

      - name: Upload release APK
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_type == 'release') || (github.event_name != 'workflow_dispatch' && !contains(github.ref, 'debug')) }}
        uses: actions/upload-artifact@v4
        with:
          name: mobilecinema-v${{ steps.version.outputs.version_name }}-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload debug APK
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: mobilecinema-v${{ steps.version.outputs.version_name }}-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          name: Release v${{ steps.version.outputs.version_name }}
