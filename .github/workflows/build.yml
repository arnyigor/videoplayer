name: Build Android

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version_major:
        description: Major version override
        required: false
        default: ''
      version_minor:
        description: Minor version override
        required: false
        default: ''
      version_build:
        description: Build number override
        required: false
        default: ''
      build_type:
        description: Build type
        required: true
        default: release
        type: choice
        options: [release, debug]

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: temurin
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      build_type: ${{ steps.build_meta.outputs.build_type }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Override version from workflow inputs
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version_major != '' }}
        env:
          VERSION_MAJOR: ${{ inputs.version_major }}
          VERSION_MINOR: ${{ inputs.version_minor }}
          VERSION_BUILD: ${{ inputs.version_build }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$VERSION_MAJOR" ]]; then sed -i "s/^VERSION_MAJOR=.*/VERSION_MAJOR=$VERSION_MAJOR/" version.properties; fi
          if [[ -n "$VERSION_MINOR" ]]; then sed -i "s/^VERSION_MINOR=.*/VERSION_MINOR=$VERSION_MINOR/" version.properties; fi
          if [[ -n "$VERSION_BUILD" ]]; then sed -i "s/^VERSION_BUILD=.*/VERSION_BUILD=$VERSION_BUILD/" version.properties; fi

      - name: Resolve build metadata
        id: build_meta
        shell: bash
        run: |
          set -euo pipefail
          build_type="release"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            build_type="${{ inputs.build_type }}"
          fi
          version_name=$(awk -F= '
            $1 == "VERSION_MAJOR" { major=$2 }
            $1 == "VERSION_MINOR" { minor=$2 }
            $1 == "VERSION_BUILD" { build=$2 }
            END { print major "." minor "." build }
          ' version.properties)
          printf 'build_type=%s\n' "$build_type" >> "$GITHUB_OUTPUT"
          printf 'version_name=%s\n' "$version_name" >> "$GITHUB_OUTPUT"

      - name: Create app secrets.properties
        env:
          DATA_LINK: ${{ secrets.DATA_LINK }}
          DATA_0_LINK: ${{ secrets.DATA_0_LINK }}
          BASE_LINK_FILE: ${{ secrets.BASE_LINK_FILE }}
          UPDATE_LINK: ${{ secrets.UPDATE_LINK }}
          BASE_LINK: ${{ secrets.BASE_LINK }}
          FEEDBACK_URL: ${{ secrets.FEEDBACK_URL }}
          FEEDBACK_API_KEY: ${{ secrets.FEEDBACK_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          set +x
          for name in DATA_LINK DATA_0_LINK BASE_LINK_FILE UPDATE_LINK BASE_LINK FEEDBACK_URL FEEDBACK_API_KEY; do
            test -n "${!name:-}" || { echo "Required app secret is missing: $name"; exit 1; }
          done
          umask 077
          {
            printf 'DATA_LINK=%s\n' "$DATA_LINK"
            printf 'DATA_0_LINK=%s\n' "$DATA_0_LINK"
            printf 'BASE_LINK_FILE=%s\n' "$BASE_LINK_FILE"
            printf 'UPDATE_LINK=%s\n' "$UPDATE_LINK"
            printf 'BASE_LINK=%s\n' "$BASE_LINK"
            printf 'FEEDBACK_URL=%s\n' "$FEEDBACK_URL"
            printf 'FEEDBACK_API_KEY=%s\n' "$FEEDBACK_API_KEY"
          } > secrets.properties

      - name: Restore release signing material
        if: ${{ steps.build_meta.outputs.build_type == 'release' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-release.p12
        shell: bash
        run: |
          set -euo pipefail
          set +x
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            test -n "${!name:-}" || { echo "Required signing secret is missing: $name"; exit 1; }
          done
          umask 077
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          {
            printf 'ANDROID_KEYSTORE_PATH=%s\n' "$ANDROID_KEYSTORE_PATH"
            printf 'ANDROID_KEYSTORE_PASSWORD=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'ANDROID_KEY_ALIAS=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'ANDROID_KEY_PASSWORD=%s\n' "$ANDROID_KEY_PASSWORD"
          } > signing.properties
          chmod 600 "$ANDROID_KEYSTORE_PATH" signing.properties

      - name: Build signed release APK and AAB
        if: ${{ steps.build_meta.outputs.build_type == 'release' }}
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon

      - name: Verify release APK signature
        if: ${{ steps.build_meta.outputs.build_type == 'release' }}
        shell: bash
        run: |
          set -euo pipefail
          apk=$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' -print -quit)
          test -n "$apk" || { echo 'Release APK was not produced'; exit 1; }
          apksigner=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner -print | sort -V | tail -n 1)
          test -n "$apksigner" || { echo 'apksigner was not found'; exit 1; }
          "$apksigner" verify --verbose --print-certs "$apk"

      - name: Build debug APK
        if: ${{ steps.build_meta.outputs.build_type == 'debug' }}
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobilecinema-v${{ steps.build_meta.outputs.version_name }}-${{ steps.build_meta.outputs.build_type }}
          path: |
            app/build/outputs/apk/${{ steps.build_meta.outputs.build_type }}/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Remove temporary secrets
        if: always()
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-release.p12
        shell: bash
        run: rm -f signing.properties secrets.properties "$ANDROID_KEYSTORE_PATH"

  publish:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && needs.build.outputs.build_type == 'release' }}
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download signed release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mobilecinema-v*-release
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --generate-notes --title "Release ${GITHUB_REF_NAME}"
          fi
          find release-artifacts -type f \( -name '*.apk' -o -name '*.aab' \) -print0 |
            xargs -0 gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber
